name: Bug report
description: Report a defect in tai42-storage-github (the GitHub-backed Storage provider)
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps or code that reproduce the problem.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tai42-storage-github version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, the host tai42-skeleton version, and the target repo's visibility (public/private).
      placeholder: "Python 3.13.x, macOS 15"
    validations:
      required: true
